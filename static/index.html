<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini DOCX Web Editor</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="sidebar" id="leftSidebar" aria-label="左侧功能区">
      <div class="sidebar-toggle-strip">
        <button id="sidebarToggleBtn" class="chrome-toggle" type="button" aria-controls="leftSidebar" aria-expanded="true" title="点击折叠；在此处滚轮调整左侧宽度">隐藏左侧</button>
      </div>
      <div class="operation-status-panel" aria-live="polite" aria-label="操作状态">
        <span id="operationStatusText">准备就绪</span>
      </div>
      <div class="panel quick-actions-panel">
        <div class="panel-head">
          <h2>文档</h2>
        </div>
        <div class="quick-actions-grid">
          <button id="newBtn" type="button">新建</button>
          <button id="openBtn" type="button">打开文件</button>
          <label class="file-btn fallback-file-btn quick-action-file">
            选择文件
            <input id="openDocxInput" type="file" accept=".docx">
          </label>
          <button id="saveBtn" type="button">保存文件</button>
          <label class="file-btn alt quick-action-file">
            插入图片
            <input id="imageInput" type="file" accept="image/*" multiple>
          </label>
        </div>
      </div>
      <div class="panel resource-panel">
        <div class="panel-head">
          <h2>资源监控</h2>
          <button id="cleanResourcesBtn" class="ghost-btn" type="button">清理</button>
        </div>
        <div class="resource-grid">
          <div class="resource-metric">
            <span class="resource-label">CPU</span>
            <strong id="resourceCpuText">--%</strong>
          </div>
          <div class="resource-metric">
            <span class="resource-label">内存</span>
            <strong id="resourceMemoryText">--%</strong>
          </div>
        </div>
        <p id="resourceMemoryDetail" class="resource-detail">-- / -- MB</p>
        <p id="resourceStatusText" class="resource-status"></p>
      </div>
      <div class="panel">
      <div class="panel compact-action-panel history-panel">
        <button id="historyPanelBtn" class="ghost-btn" type="button">历史/常用</button>
      </div>
      <div class="panel compact-action-panel shortcuts-panel">
        <button id="shortcutSettingsBtn" class="ghost-btn" type="button">快捷键设置</button>
      </div>
        <div class="panel-head">
          <h2>导航</h2>
        </div>
        <nav id="outline" class="outline"></nav>
        <div class="outline-filter">
          <label><input id="outlineLevel1" type="checkbox" checked> H1</label>
          <label><input id="outlineLevel2" type="checkbox" checked> H2</label>
          <label><input id="outlineLevel3" type="checkbox" checked> H3</label>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h2>二级导航</h2>
          <div class="secondary-outline-controls" aria-label="二级导航层级范围">
            <span id="secondaryOutlineLevelText">L2</span>
            <button id="secondaryOutlineLessBtn" class="outline-level-btn" type="button" title="更少级别（最低为 level 2）" aria-label="更少级别">−</button>
            <button id="secondaryOutlineMoreBtn" class="outline-level-btn" type="button" title="更多级别" aria-label="更多级别">+</button>
          </div>
        </div>
        <nav id="secondaryOutline" class="outline secondary-outline"></nav>
      </div>
    </aside>

    <main class="workspace">
      <header class="toolbar-wrap" id="topToolbar">
        <div class="toolbar-groups">
          <section class="tool-group font-tool-group collapsible-tool-group">
            <div class="tool-group-head">
              <button id="fontAdvancedToggle" class="advanced-toggle-btn tool-group-toggle" data-label="字体" type="button" aria-controls="fontAdvancedContent" aria-expanded="false">字体</button>
            </div>
            <div id="fontAdvancedContent" class="collapsible-tool-content hidden-tool-content">
              <div class="toolbar-row dense">
              <select id="fontFamily">
                <option>Georgia</option>
                <option>Calibri</option>
                <option>Arial</option>
                <option selected>Times New Roman</option>
                <option>Microsoft YaHei</option>
                <option>SimSun</option>
                <option>Consolas</option>
              </select>

              <select id="fontSize">
                <option value="10">10</option>
                <option value="12" selected>12</option>
                <option value="14">14</option>
                <option value="16">16</option>
                <option value="18">18</option>
                <option value="20">20</option>
                <option value="24">24</option>
                <option value="28">28</option>
                <option value="32">32</option>
              </select>

              <button data-cmd="bold" type="button">B</button>
              <button data-cmd="italic" type="button">I</button>
              <button data-cmd="underline" type="button">U</button>
              <input id="highlightColor" type="color" value="#fff2aa" title="文字底色">
              <button id="applyHighlightBtn" type="button">底色</button>
              <button id="clearFormatBtn" type="button">清除格式</button>
              <button id="formatPainterBtn" type="button">格式刷</button>
              </div>
            </div>
          </section>

          <section class="tool-group paragraph-tool-group">
            <div class="toolbar-row dense">
              <div class="style-tools">
                <select id="paragraphStyleSelect"></select>
                <button id="saveStyleBtn" type="button">保存样式</button>
                <button id="updateStyleBtn" type="button">更新样式</button>
              </div>

              <select id="lineSpacingSelect">
                <option value="1">单倍行距</option>
                <option value="1.5" selected>1.5 倍行距</option>
                <option value="2">2 倍行距</option>
                <option value="2.5">2.5 倍行距</option>
              </select>

              <label class="inline-field">
                段前
                <input id="spaceBeforeInput" type="number" min="0" step="1" value="0">
              </label>

              <label class="inline-field">
                段后
                <input id="spaceAfterInput" type="number" min="0" step="1" value="0">
              </label>

              <button class="alignment-icon-btn" data-align="justifyLeft" type="button" title="左对齐" aria-label="左对齐">
                <span class="align-icon align-left" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
              </button>
              <button class="alignment-icon-btn" data-align="justifyCenter" type="button" title="居中" aria-label="居中">
                <span class="align-icon align-center" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
              </button>
              <button class="alignment-icon-btn" data-align="justifyRight" type="button" title="右对齐" aria-label="右对齐">
                <span class="align-icon align-right" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
              </button>
              <button class="alignment-icon-btn" data-align="justifyFull" type="button" title="两端对齐" aria-label="两端对齐">
                <span class="align-icon align-justify" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
              </button>

              <div class="numbering-tools">
                <button id="toggleNumberingBtn" type="button">编号</button>
                <select id="numberFormatSelect">
                  <option value="decimal">1, 2, 3</option>
                  <option value="upperLetter">A, B, C</option>
                  <option value="lowerLetter">a, b, c</option>
                  <option value="upperRoman">I, II, III</option>
                  <option value="lowerRoman">i, ii, iii</option>
                </select>
              </div>
            </div>
          </section>

          <section class="tool-group table-tool-group collapsible-tool-group">
            <div class="tool-group-head">
              <button id="tableAdvancedToggle" class="advanced-toggle-btn tool-group-toggle" data-label="表格" type="button" aria-controls="tableAdvancedContent" aria-expanded="false">表格</button>
            </div>
            <div id="tableAdvancedContent" class="collapsible-tool-content hidden-tool-content">
              <div class="toolbar-row dense">
                <button id="insertTableBtn" type="button">插入表格</button>
                <button id="addRowBtn" type="button">加行</button>
                <button id="removeRowBtn" type="button">删行</button>
                <button id="addColBtn" type="button">加列</button>
                <button id="removeColBtn" type="button">删列</button>
                <button id="deleteTableBtn" type="button">删表</button>
              </div>
            </div>
          </section>

          <section class="tool-group page-tool-group collapsible-tool-group">
            <div class="tool-group-head">
              <button id="pageAdvancedToggle" class="advanced-toggle-btn tool-group-toggle" data-label="页面" type="button" aria-controls="pageAdvancedContent" aria-expanded="false">页面</button>
            </div>
            <div id="pageAdvancedContent" class="collapsible-tool-content hidden-tool-content">
              <div class="toolbar-row dense">
                <label class="inline-field">
                  宽 (mm)
                  <input id="pageWidthInput" type="number" min="50" step="1" value="210">
                </label>
                <label class="inline-field">
                  高 (mm)
                  <input id="pageHeightInput" type="number" min="50" step="1" value="297">
                </label>
                <button id="applyPageSizeBtn" type="button">应用</button>
              </div>
            </div>
          </section>
          <div class="toolbar-control-row">
            <button id="toolbarToggleBtn" class="chrome-toggle" type="button" aria-controls="topToolbar" aria-expanded="true" title="点击折叠；在此处滚轮调整顶部高度">隐藏上方</button>
          </div>
        </div>
      </header>

      <section id="pageStage" class="page-stage">
        <div id="editor" class="editor" contenteditable="true"></div>
      </section>

      <footer class="statusbar">
        <span id="statusText">当前文件：尚未保存</span>
        <span>本地服务地址：<code id="serverAddress"></code></span>
      </footer>
    </main>
  </div>

  <template id="outlineItemTemplate">
    <button class="outline-item" type="button"></button>
  </template>

  <div id="shortcutModal" class="modal hidden">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-panel">
      <div class="panel-head">
        <h2>快捷键设置</h2>
        <div class="modal-actions">
          <button id="resetShortcutsBtn" class="ghost-btn" type="button">重置</button>
          <button id="closeShortcutModalBtn" class="ghost-btn" type="button">关闭</button>
        </div>
      </div>
      <div id="shortcutList" class="shortcut-list"></div>
    </div>
  </div>

  <div id="historyModal" class="modal hidden">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-panel">
      <div class="panel-head">
        <h2>历史记录与常用目录</h2>
        <div class="modal-actions">
          <button id="browseDirBtn" class="ghost-btn" type="button">浏览目录</button>
          <button id="addFavoriteDirBtn" class="ghost-btn" type="button">添加常用目录</button>
          <button id="closeHistoryModalBtn" class="ghost-btn" type="button">关闭</button>
        </div>
      </div>
      <section class="history-section">
        <h3>最近打开</h3>
        <div id="recentFileList" class="history-list"></div>
      </section>
      <section class="history-section">
        <h3>常用目录</h3>
        <div id="favoriteDirList" class="history-list"></div>
      </section>
      <section class="history-section">
        <h3>目录文件</h3>
        <div id="dirFileList" class="history-list"></div>
      </section>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
